# AgentWire Configuration
# Copy to ~/.agentwire/config.yaml

# === Server Settings ===
server:
  host: "0.0.0.0"              # Bind to all interfaces
  port: 8765                    # HTTPS port
  ssl:
    cert: "~/.agentwire/cert.pem"
    key: "~/.agentwire/key.pem"
  
  # Public URL for clients (when behind proxy or on different network)
  # public_url: "https://myserver.local:8765"

# === Projects Directory ===
projects:
  dir: "~/projects"
  worktrees:
    enabled: true               # Use git worktrees for parallel sessions
    suffix: "-worktrees"        # ~/projects/myapp-worktrees/
    auto_create_branch: true    # Create branch if it doesn't exist

# === Text-to-Speech ===
tts:
  # Backend: chatterbox | elevenlabs | none
  backend: "chatterbox"
  
  # TTS server URL - can be local or remote
  url: "http://localhost:8100"
  # Remote example: url: "http://gpu-server:8100"
  
  # Default voice settings
  default_voice: "default"
  exaggeration: 0.5            # 0-1, voice expressiveness
  cfg_weight: 0.5              # 0-1, voice consistency

# === Speech-to-Text ===
stt:
  # Backend options by platform:
  #   macOS: whisperkit (recommended), whispercpp, openai
  #   Linux: whispercpp, openai
  #   Any:   openai (requires API key)
  backend: "whisperkit"
  
  # Local model path (for whisperkit/whispercpp)
  model_path: "~/models/whisperkit/large-v3"
  
  # Language for transcription
  language: "en"

# === Agent Command ===
agent:
  # Command to start AI agent in new sessions
  # Placeholders: {name}, {path}, {model}
  command: "claude --dangerously-skip-permissions"

# === Remote Machines Registry ===
machines:
  file: "~/.agentwire/machines.json"

# === Room Configurations ===
rooms:
  file: "~/.agentwire/rooms.json"

# === Image Uploads ===
uploads:
  # Directory for uploaded images (should be accessible from all machines)
  dir: "~/.agentwire/uploads"

  # Maximum file size in MB
  max_size_mb: 10

  # Auto-cleanup: delete files older than N days (0 = disabled)
  cleanup_days: 7

# === Triggers ===
# Pattern matching against tmux output with configurable actions
triggers:
  # --- Built-in Triggers ---
  # These are defined in code but can be enabled/disabled here.
  # You cannot remove them, only toggle them.

  say_command:
    enabled: true     # Matches `say "..."` commands for TTS playback

  ask_question:
    enabled: true     # Matches AskUserQuestion blocks for popup UI

  # --- User-Defined Triggers ---
  # Create your own triggers to react to output patterns.

  # Example: Notify on build failures
  build_failed:
    pattern: 'npm ERR!|error:|BUILD FAILED|FAILED:'
    mode: transient           # Match against stream chunks as they arrive
    action: notify            # Send browser notification
    title: "Build Failed"     # Notification title
    sound: error              # Play error sound

  # Example: TTS announcement when tests pass
  # Named capture groups like (?P<count>...) become template variables
  tests_passed:
    pattern: 'All (?P<count>\d+) tests? passed'
    mode: transient
    action: tts               # Speak via TTS
    template: "{count} tests passed!"

  # Example: Popup when deployment completes
  deploy_complete:
    pattern: 'Deployed to (?P<url>https?://\S+)'
    mode: transient
    action: popup             # Show popup in room UI
    title: "Deployment Complete"
    template: "Live at {url}"

  # Example: Track persistent prompts (visible on screen)
  waiting_for_input:
    pattern: 'Press Enter to continue|Waiting for input'
    mode: persistent          # Match against accumulated buffer (last N lines)
    action: notify
    title: "Waiting"

  # Example: Send keystrokes back to tmux
  # auto_continue:
  #   pattern: 'Continue\? \[y/N\]'
  #   mode: transient
  #   action: send_keys       # Send input to tmux session
  #   keys: "y\n"             # What to send

  # --- Trigger Modes ---
  # transient:  Matches against each chunk as it streams through (one-time events)
  # persistent: Matches against a rolling buffer of recent output (prompts that stay visible)

  # --- Available Actions ---
  # tts:        Speak text via TTS (use 'template' for message)
  # notify:     Send browser notification (use 'title' and optionally 'template')
  # popup:      Show popup in room UI (use 'title' and 'template')
  # sound:      Play a sound file (use 'sound' for sound name)
  # send_keys:  Send keystrokes to tmux session (use 'keys')
  # broadcast:  Send custom WebSocket message (use 'event' and 'data')
